name: macOS Bundle

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse
  TSUKIMI_RUST_TOOLCHAIN: nightly

jobs:
  build:
    name: Build macOS aarch64 app
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@nightly
        with:
          targets: aarch64-apple-darwin

      - name: Cache Cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: ". -> target"

      - name: Build app bundle
        run: |
          scripts/build-macos-app.sh --install-deps --skip-codesign

      - name: Package artifact
        run: |
          mkdir -p dist/artifacts
          tar -czf "dist/artifacts/Tsukimi-macos-aarch64.tar.gz" \
            -C dist/macos \
            Tsukimi.app

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Tsukimi-macos-aarch64
          path: dist/artifacts/Tsukimi-macos-aarch64.tar.gz
          if-no-files-found: error
          compression-level: 0
